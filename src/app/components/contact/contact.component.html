<section class="contact section-padding" id="contact">
  <div class="container">
    <!-- Animated Heading with Bike -->
    <app-animated-heading text="Get In Touch" vehicle="bike"></app-animated-heading>

    <div class="contact-grid">
      <!-- Left: Map + Details -->
      <div class="contact-left" scrollReveal revealDirection="left">
        <div class="map-wrapper">
          <iframe
            src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3920.0!2d78.08!3d10.96!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x0%3A0x0!2zMTDCsDU3JzM2LjAiTiA3OMKwMDQnNDguMCJF!5e0!3m2!1sen!2sin!4v1234567890"
            width="100%" height="280" style="border:0; border-radius: 16px;" allowfullscreen>
          </iframe>
        </div>

        <div class="contact-details">
          <div class="contact-item" (click)="callPhone('9486547938')">
            <span class="contact-icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg></span>
            <div>
              <strong>Phone</strong>
              <p>9486547938 / 9751212846</p>
            </div>
          </div>
          <div class="contact-item" (click)="sendEmail()">
            <span class="contact-icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="4" width="20" height="16" rx="2" ry="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg></span>
            <div>
              <strong>Email</strong>
              <p>sriramtours27&#64;gmail.com</p>
            </div>
          </div>
          <div class="contact-item">
            <span class="contact-icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg></span>
            <div>
              <strong>Address</strong>
              <p>9th Cross, Thiruvalluvar Nagar, Kothur Road, Velusamypuram, L.N.S(Po), Karur – 639008</p>
            </div>
          </div>
        </div>
      </div>

      <!-- Right: Form -->
      <div class="contact-right glass-card" scrollReveal revealDirection="right">
        <h3>Send Us an Enquiry</h3>
        <form (ngSubmit)="submitForm()">
          <div class="form-group">
            <input type="text" id="name" [(ngModel)]="form.name" name="name"
                   required placeholder=" ">
            <label for="name">Your Name</label>
          </div>
          <div class="form-group">
            <input type="tel" id="phone" [(ngModel)]="form.phone" name="phone"
                   required placeholder=" ">
            <label for="phone">Phone Number</label>
          </div>
          <div class="form-group">
            <input type="email" id="email" [(ngModel)]="form.email" name="email"
                   placeholder=" ">
            <label for="email">Email Address</label>
          </div>
          <div class="form-group">
            <input type="text" id="destination" [(ngModel)]="form.destination" name="destination"
                   placeholder=" ">
            <label for="destination">Preferred Destination</label>
          </div>
          <div class="form-group">
            <textarea id="message" [(ngModel)]="form.message" name="message"
                      rows="4" placeholder=" "></textarea>
            <label for="message">Your Message</label>
          </div>
          <button type="submit" class="btn btn-gold submit-btn">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="btn-icon"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
            Send via WhatsApp
          </button>
        </form>
      </div>
    </div>
  </div>
</section>
