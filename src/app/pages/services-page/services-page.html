<section class="page-hero">
  <div class="hero-bg">
    <img src="https://images.unsplash.com/photo-1488646953014-85cb44e25828?w=1600&q=80" alt="Our Services">
  </div>
  <div class="hero-overlay"></div>
  <div class="hero-content">
    <h1 class="page-title animated-fade-up">Curated <span class="highlight-beige">Experiences</span></h1>
    <p class="page-subtitle animated-fade-up" style="animation-delay: 0.2s">Everything you need for a seamless and unforgettable journey.</p>
  </div>
</section>

<app-services></app-services>

<!-- Premium Educational Services Block -->
<section class="educational-featured-services section-padding">
  <div class="container">
    <app-animated-heading 
      text="Specialized Educational Journeys" 
      subtitle="We are pioneers in crafting safe, informative, and engaging excursions tailored to meet academic standards.">
    </app-animated-heading>

    <div class="edu-services-grid" scrollReveal>
      <!-- School Educational Tours -->
      <div class="edu-service-card glass-card">
        <div class="card-image-box">
          <img src="https://images.unsplash.com/photo-1509062522246-3755977927d7?w=600&q=80" alt="School Educational Tours" loading="lazy">
        </div>
        <h3>School Educational Tours</h3>
      </div>

      <!-- College Educational Tours -->
      <div class="edu-service-card glass-card">
        <div class="card-image-box">
          <img src="https://images.unsplash.com/photo-1523240795612-9a054b0db644?w=600&q=80" alt="College Educational Tours" loading="lazy">
        </div>
        <h3>College Educational Tours</h3>
      </div>

      <!-- Heritage Visits -->
      <div class="edu-service-card glass-card">
        <div class="card-image-box">
          <img src="https://images.unsplash.com/photo-1582510003544-4d00b7f74220?w=600&q=80" alt="Heritage & Archaeology" loading="lazy">
        </div>
        <h3>Heritage & Archaeology</h3>
      </div>

      <!-- Nature Exploration Trips -->
      <div class="edu-service-card glass-card">
        <div class="card-image-box">
          <img src="https://images.unsplash.com/photo-1534447677768-be436bb09401?w=600&q=80" alt="Nature & Wildlife Exploration" loading="lazy">
        </div>
        <h3>Nature & Wildlife Exploration</h3>
      </div>

      <!-- Cultural Tours -->
      <div class="edu-service-card glass-card">
        <div class="card-image-box">
          <img src="https://images.unsplash.com/photo-1617631493756-d922498942b2?w=600&q=80" alt="Cultural Heritage Tours" loading="lazy">
        </div>
        <h3>Cultural Heritage Tours</h3>
      </div>

      <!-- Multi-Day Student Experiences -->
      <div class="edu-service-card glass-card">
        <div class="card-image-box">
          <img src="https://images.unsplash.com/photo-1544620347-c4fd4a3d5957?w=600&q=80" alt="Multi-Day Excursions" loading="lazy">
        </div>
        <h3>Multi-Day Excursions</h3>
      </div>
    </div>

    <div class="services-cta text-center" scrollReveal [revealDelay]="150">
      <a routerLink="/educational-tours" class="btn btn-gold btn-large">
        Explore Educational Packages
      </a>
    </div>
  </div>
</section>
