<section class="cta-banner" #headingEl>
  <div class="cta-bg">
    <img src="https://images.unsplash.com/photo-1469854523086-cc02fe5d8800?w=1920&q=80"
         alt="Road trip adventure" loading="lazy">
  </div>
  <div class="cta-overlay"></div>
  <div class="cta-content">
    <!-- Mountain Rise Heading (Animation 4) -->
    <h2 class="mountain-heading">
      @for (word of headingWords; track $index; let i = $index) {
        <span class="mountain-word"
              [class.revealed]="headingRevealed"
              [style.animation-delay]="(i * 150) + 'ms'">
          {{ word }}
        </span>
        @if (i < headingWords.length - 1) {
          <span class="heading-space">&nbsp;</span>
        }
      }
    </h2>
    <div class="cta-buttons">
      <button class="btn btn-gold pulse-glow" (click)="whatsappNow()">
        WhatsApp Now
      </button>
      <button class="btn btn-outline" (click)="scrollToDestinations()">
        Explore Packages
      </button>
    </div>
  </div>
</section>
