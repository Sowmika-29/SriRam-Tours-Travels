<nav class="navbar" [class.scrolled]="isScrolled()" id="navbar">
  <div class="navbar-inner">
    <!-- Logo -->
    <a routerLink="/" class="logo" (click)="closeMobileMenu()">
      <span class="logo-icon">
        <img src="images/logo.png" alt="SRI RAM Tour & Travels Logo" width="44" height="44">
      </span>
      <span class="logo-text">
        <span class="logo-main">SRI RAM</span>
        <span class="logo-sub">Tour & Travels</span>
      </span>
    </a>

    <!-- Desktop Nav Links -->
    <ul class="nav-links">
      @for (link of navLinks; track link.label) {
        <li>
          <a [routerLink]="link.href" routerLinkActive="active-link" [routerLinkActiveOptions]="{exact: link.href === '/'}" class="nav-link">{{ link.label }}</a>
        </li>
      }
    </ul>

    <!-- WhatsApp CTA -->
    <button class="btn-whatsapp-nav" (click)="whatsappChat()">
      <span class="wa-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg></span> WhatsApp Us
    </button>

    <!-- Mobile Hamburger -->
    <button class="hamburger" [class.active]="isMobileMenuOpen()" (click)="toggleMobileMenu()" aria-label="Toggle menu">
      <span></span>
      <span></span>
      <span></span>
    </button>
  </div>
</nav>

<!-- Mobile Menu Overlay -->
@if (isMobileMenuOpen()) {
  <div class="mobile-overlay" (click)="closeMobileMenu()">
    <div class="mobile-menu" (click)="$event.stopPropagation()">
      <div class="mobile-menu-header">
        <span class="logo-main">SRI RAM</span>
        <button class="close-btn" (click)="closeMobileMenu()">✕</button>
      </div>
      <ul class="mobile-links">
        @for (link of navLinks; track link.label; let i = $index) {
          <li [style.animation-delay]="(i * 80) + 'ms'">
            <a [routerLink]="link.href" routerLinkActive="active-link" [routerLinkActiveOptions]="{exact: link.href === '/'}" (click)="closeMobileMenu()">{{ link.label }}</a>
          </li>
        }
      </ul>
      <button class="btn btn-gold mobile-wa" (click)="whatsappChat()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="btn-icon"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
        WhatsApp Us
      </button>
    </div>
  </div>
}
