<nav class="navbar" [class.scrolled]="isScrolled()" [class.hidden]="isHidden()" id="navbar">
  <!-- Sparkling Light Particles -->
  <div class="sparkle-layer">
    <div class="sparkle s1"></div>
    <div class="sparkle s2"></div>
    <div class="sparkle s3"></div>
    <div class="sparkle s4"></div>
    <div class="sparkle s5"></div>
  </div>
  <div class="navbar-inner">
    <!-- Logo -->
    <a routerLink="/" class="logo" (click)="closeMobileMenu()">
      <span class="logo-icon">
        <img src="/images/logo.png" alt="SRI RAM Tour & Travels Logo" width="44" height="44">
      </span>
      <span class="logo-text">
        <span class="logo-main">SRI RAM</span>
        <span class="logo-sub">Tour & Travels</span>
      </span>
    </a>

    <!-- Desktop Nav Links -->
    <ul class="nav-links">
      @for (link of navLinks; track link.label) {
        <li>
          <a [routerLink]="link.href" routerLinkActive="active-link" [routerLinkActiveOptions]="{exact: link.href === '/'}" class="nav-link">{{ link.label }}</a>
        </li>
      }
    </ul>

    <!-- Contact Us CTA -->
    <a routerLink="/contact" class="btn btn-gold btn-nav-contact" (click)="closeMobileMenu()">
      Contact Us
    </a>

    <!-- Mobile Hamburger -->
    <button class="hamburger" [class.active]="isMobileMenuOpen()" (click)="toggleMobileMenu()" aria-label="Toggle menu">
      <span></span>
      <span></span>
      <span></span>
    </button>
  </div>
</nav>

<!-- Mobile Menu Overlay -->
@if (isMobileMenuOpen()) {
  <div class="mobile-overlay" (click)="closeMobileMenu()">
    <div class="mobile-menu" (click)="$event.stopPropagation()">
      <div class="mobile-menu-header">
        <span class="logo-main">SRI RAM</span>
        <button class="close-btn" (click)="closeMobileMenu()">✕</button>
      </div>
      <ul class="mobile-links">
        @for (link of navLinks; track link.label; let i = $index) {
          <li [style.animation-delay]="(i * 80) + 'ms'">
            <a [routerLink]="link.href" routerLinkActive="active-link" [routerLinkActiveOptions]="{exact: link.href === '/'}" (click)="closeMobileMenu()">{{ link.label }}</a>
          </li>
        }
      </ul>
      <a routerLink="/contact" class="btn btn-gold mobile-wa" (click)="closeMobileMenu()">
        Contact Us
      </a>
    </div>
  </div>
}
