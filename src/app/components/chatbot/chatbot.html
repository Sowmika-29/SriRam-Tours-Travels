<!-- Floating Button -->
<div class="chat-fab" (click)="toggleChat()" [class.hidden]="isOpen()">
  <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="chat-icon">
    <path d="M12 8V4m0 0a1.5 1.5 0 1 0 0-3 1.5 1.5 0 0 0 0 3z"/>
    <rect x="4" y="8" width="16" height="12" rx="2"/>
    <circle cx="9" cy="13" r="1" fill="currentColor"/>
    <circle cx="15" cy="13" r="1" fill="currentColor"/>
    <path d="M9 17h6"/>
    <path d="M2 13h2m16 0h2"/>
  </svg>
</div>

<!-- Chat Window -->
<div class="chat-window glass-card" [class.open]="isOpen()">
  <div class="chat-header">
    <div class="header-info">
      <div class="bot-avatar">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 8V4m0 0a1.5 1.5 0 1 0 0-3 1.5 1.5 0 0 0 0 3z"/>
          <rect x="4" y="8" width="16" height="12" rx="2"/>
          <circle cx="9" cy="13" r="1" fill="currentColor"/>
          <circle cx="15" cy="13" r="1" fill="currentColor"/>
          <path d="M9 17h6"/>
          <path d="M2 13h2m16 0h2"/>
        </svg>
      </div>
      <div>
        <h4>Sri Ram Assistant</h4>
        <span class="status">Online</span>
      </div>
    </div>
    <button class="close-btn" (click)="toggleChat()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="18" y1="6" x2="6" y2="18"></line>
        <line x1="6" y1="6" x2="18" y2="18"></line>
      </svg>
    </button>
  </div>

  <div class="chat-body">
    @for (msg of messages(); track $index) {
      <div class="chat-bubble" [class.bot]="msg.isBot" [class.user]="!msg.isBot">
        {{ msg.text }}
      </div>
    }

    <div class="chat-options">
      @for (opt of options; track opt) {
        <button class="chat-option-btn" (click)="handleOptionClick(opt)">
          {{ opt }}
        </button>
      }
    </div>
  </div>
</div>
