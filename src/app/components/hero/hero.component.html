<section class="hero" id="hero">
  <!-- Background -->
  <div class="hero-bg">
    <img src="https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=1920&q=80" alt="Mountain landscape" loading="eager">
  </div>
  <div class="hero-overlay"></div>

  <!-- Particles -->
  <canvas #particlesCanvas class="particles-canvas"></canvas>

  <!-- Content -->
  <div class="hero-content">
    <div class="hero-badge">✦ Karur's Most Trusted Since 2017</div>

    <!-- Text Heading -->
    <div class="bus-heading-wrapper" #busHeading>
      <h1>
        @for (letter of taglineLetters; track $index; let i = $index) {
          @if (letter === ' ') {
            <span class="heading-space">&nbsp;</span>
          } @else {
            <span class="heading-letter"
                  [class.animate]="busAnimationStarted"
                  [style.animation-delay]="(i * 80 + 800) + 'ms'">
              {{ letter }}
            </span>
          }
        }
      </h1>
    </div>

    <p class="hero-sub">Luxury travel · Premium buses · Unforgettable events</p>

    <div class="hero-ctas">
      <button class="btn btn-primary" (click)="scrollToDestinations()">
        Explore Destinations
      </button>
      <button class="btn btn-outline" (click)="scrollDown()">
        Plan My Trip
      </button>
      <button class="btn btn-gold" (click)="openWhatsApp()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="btn-icon"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path></svg>
        WhatsApp Now
      </button>
    </div>
  </div>


</section>
